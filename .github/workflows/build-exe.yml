name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "attendance_app.pyw"
      - "build/timex_editor.spec"
      - "requirements.txt"
      - ".github/workflows/build-exe.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build TimexEditor.exe
        run: |
          python -m PyInstaller build/timex_editor.spec --noconfirm --distpath dist --workpath build/pyinstaller
          copy /Y dist\TimexEditor.exe TimexEditor.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimexEditor-Windows
          path: TimexEditor.exe
